	<circle id="circle_B" r="144.57577660861008" cx="408.7371523040217" cy="455.42422339138994" style="fill:#00FF00;opacity:.5"></circle>
	<text id="title_A" x="273.30922474129125" y="297.59099617315496" font-size="12px" font-family="Verdana" font-weight="bold" dominant-baseline="middle" text-anchor="middle" style="fill:#000000;cursor:move">GO:nucleus</text>
